<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poder Olfativo — Entrar</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-card {
      background: #fff; border-radius: 20px; padding: 2.5rem 2rem;
      width: 100%; max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    .logo-wrap { text-align: center; margin-bottom: 1.5rem; }
    .logo-wrap img { width: 90px; height: 90px; object-fit: contain; border-radius: 50%; }
    .brand-name { font-size: 1.3rem; font-weight: 800; color: #1a1a2e; margin-top: .5rem; }
    .brand-name span { color: #c9a96e; }
    .brand-sub { font-size: .75rem; color: #888; letter-spacing: 1px; text-transform: uppercase; }
    .form-label { font-weight: 600; font-size: .85rem; color: #444; }
    .form-control { border-radius: 10px; padding: .7rem 1rem; border: 1.5px solid #e0dbd4; }
    .form-control:focus { border-color: #c9a96e; box-shadow: 0 0 0 3px rgba(201,169,110,.15); }
    .btn-entrar {
      background: #1a1a2e; color: #fff; border: none; border-radius: 10px;
      padding: .8rem; font-weight: 700; font-size: 1rem; width: 100%; letter-spacing: .5px;
      transition: background .2s;
    }
    .btn-entrar:hover { background: #c9a96e; }
    .divider { border-color: #f0ebe4; margin: 1.25rem 0; }
    .error-msg { background: #fef2f2; color: #991b1b; border-radius: 10px; padding: .75rem 1rem; font-size: .875rem; }
    .input-icon { position: relative; }
    .input-icon i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #aaa; }
    .input-icon input { padding-left: 2.5rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-wrap">
      <img src="{{ url_for('static', filename='logo.png') }}" alt="Poder Olfativo">
      <div class="brand-name">Poder <span>Olfativo</span></div>
      <div class="brand-sub">Sistema de Gestão</div>
    </div>

    {% if error %}
    <div class="error-msg mb-3">
      <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
    </div>
    {% endif %}

    <form method="post">
      <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
      <div class="mb-3">
        <label class="form-label">Usuário</label>
        <div class="input-icon">
          <i class="bi bi-person"></i>
          <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Senha</label>
        <div class="input-icon">
          <i class="bi bi-lock"></i>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="btn-entrar">Entrar</button>
    </form>

    <hr class="divider">
    <div class="text-center text-muted" style="font-size:.72rem">
      🔒 Acesso restrito — Poder Olfativo
    </div>
  </div>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</body>
</html>
