{% extends 'base.html' %}
{% block title %}{{ 'Editar' if supplier else 'Novo' }} Fornecedor{% endblock %}
{% block page_title %}{{ 'Editar' if supplier else 'Novo' }} Fornecedor{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card">
      <div class="card-body">
        <form method="post">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label fw-semibold">Razão Social / Nome *</label>
              <input type="text" name="name" class="form-control" value="{{ supplier.name if supplier else '' }}" required autofocus>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Nome do Contato</label>
              <input type="text" name="contact_name" class="form-control" value="{{ supplier.contact_name if supplier else '' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">CNPJ</label>
              <input type="text" name="cnpj" class="form-control" value="{{ supplier.cnpj if supplier else '' }}" placeholder="00.000.000/0000-00">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Telefone / WhatsApp</label>
              <input type="text" name="phone" class="form-control" value="{{ supplier.phone if supplier else '' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">E-mail</label>
              <input type="email" name="email" class="form-control" value="{{ supplier.email if supplier else '' }}">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Endereço</label>
              <input type="text" name="address" class="form-control" value="{{ supplier.address if supplier else '' }}">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Observações</label>
              <textarea name="notes" class="form-control" rows="2">{{ supplier.notes if supplier else '' }}</textarea>
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">Salvar</button>
            <a href="{{ url_for('suppliers') }}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
