{% extends 'base.html' %}
{% block title %}{{ 'Editar' if row else 'Nova' }} Conta a Pagar{% endblock %}
{% block page_title %}{{ 'Editar' if row else 'Nova' }} Conta a Pagar{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card">
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Descrição *</label>
            <input type="text" name="description" class="form-control" required
                   placeholder="Ex: Aluguel, fornecedor de frascos, embalagens…"
                   value="{{ row.description if row else '' }}">
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Categoria</label>
              <input type="text" name="category" class="form-control" list="categoriaList"
                     placeholder="Ex: Fornecedores, Embalagens, Marketing…"
                     value="{{ row.category if row else '' }}">
              <datalist id="categoriaList">
                <option value="Fornecedores">
                <option value="Embalagens">
                <option value="Marketing">
                <option value="Frete">
                <option value="Impostos">
                <option value="Assinaturas/Sistemas">
                <option value="Outros">
              </datalist>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Fornecedor</label>
              <select name="supplier_id" class="form-select">
                <option value="">— nenhum —</option>
                {% for s in suppliers %}
                <option value="{{ s.id }}" {{ 'selected' if row and row.supplier_id==s.id }}>{{ s.name }}</option>
                {% endfor %}
              </select>
            </div>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Valor (R$) *</label>
              <input type="number" step="0.01" min="0" name="amount" class="form-control" required
                     value="{{ '%.2f'|format(row.amount) if row else '' }}">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Vencimento *</label>
              <input type="date" name="due_date" class="form-control" required
                     value="{{ row.due_date if row else '' }}">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Observações</label>
            <textarea name="notes" class="form-control" rows="2">{{ row.notes if row else '' }}</textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Salvar</button>
            <a href="{{ url_for('payables') }}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
